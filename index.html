<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>北京买房避雷地图</title>
<link rel="stylesheet" href="style.css">
<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=RQABZ-YR7LG-J2TQG-QWIE3-B7ARV-QPFQS"></script>
</head>
<body>

<header id="page-header">
  <div class="title-row">
    <h1>北京买房避雷地图</h1>
    <span class="disclaimer">数据来源于网络，仅供参考</span>
  </div>
  <span id="data-status"></span>
</header>

<div id="loader">
  <div id="loader-text">正在加载小区数据 (data.md) ...</div>
  <div id="manual-load">
    <input type="file" id="file-input" accept=".md,text/markdown,text/plain">
    <div class="hint">
      如果一直停在这里：浏览器出于安全考虑，禁止网页用 <code>fetch</code> 直接读取本地磁盘上的文件（file:// 协议）。
      点上面的按钮，手动选择同目录下的 <code>data.md</code> 文件即可加载；
      如果是通过 http/https 网址打开本页面仍卡在这里，请检查 data.md 是否和 index.html 在同一目录。
    </div>
  </div>
</div>

<div id="app">
  <!-- 悬浮工具条 -->
  <div id="map-toolbar">
    <div id="search-box">
      <input type="text" id="search-input" placeholder="搜索小区名称...">
    </div>
    <button id="btn-filter" class="toolbar-btn">
      筛选
      <span id="filter-badge" class="badge"></span>
    </button>
    <button id="btn-list" class="toolbar-btn">列表</button>
  </div>

  <!-- 地图 -->
  <div id="map-container"></div>

  <!-- 图例 -->
  <div id="map-legend">
    <div class="legend-row"><span class="dot" style="background:#d7263d"></span>避雷小区</div>
    <div class="legend-row"><span class="dot" style="background:#e0a800"></span>跌幅过大 / 营销过度</div>
    <div class="legend-row"><span class="dot" style="background:#f2790f"></span>不建议买</div>
  </div>

  <!-- 底部状态条 -->
  <div id="map-footer">
    <span>当前显示 <b id="visible-count">0</b> / <b id="total-count">0</b> 个小区</span>
  </div>

  <!-- 抽屉遮罩 -->
  <div id="drawer-backdrop"></div>

  <!-- 筛选抽屉 -->
  <div id="filter-drawer" class="drawer">
    <div class="drawer-header">
      <span>筛选</span>
      <button id="filter-drawer-close" class="drawer-close">✕</button>
    </div>
    <div class="drawer-body">
      <div class="filter-section-title">按分类</div>
      <div id="category-filters" class="filter-chip-group"></div>
      <div class="filter-section-title">按行政区</div>
      <div id="district-filters" class="filter-chip-group"></div>
      <button id="clear-filter" class="clear-filter-btn">清除全部筛选</button>
    </div>
  </div>

  <!-- 列表抽屉 -->
  <div id="list-drawer" class="drawer">
    <div class="drawer-header">
      <span>小区列表</span>
      <button id="list-drawer-close" class="drawer-close">✕</button>
    </div>
    <div class="drawer-body no-pad">
      <div id="community-list"></div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div id="detail-modal">
    <div id="detail-backdrop"></div>
    <div id="detail-card">
      <button id="detail-close" class="detail-close-btn">✕</button>
      <div class="detail-header">
        <div id="detail-name" class="detail-name"></div>
        <span id="detail-badge" class="detail-badge"></span>
      </div>
      <div id="detail-address" class="detail-address"></div>
      <div class="detail-reason-title">具体原因</div>
      <div id="detail-reason" class="detail-reason"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
